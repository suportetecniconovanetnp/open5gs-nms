services:
  nginx:
    image: nginx:alpine
    container_name: open5gs-nms-nginx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/nms.conf:ro
      - ./nginx/certs:/etc/nginx/certs
      - ./logs/nginx:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      cert-init:
        condition: service_completed_successfully
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,container"
    labels:
      com.open5gs.nms.service: "nginx"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: open5gs-nms-backend
    restart: unless-stopped
    privileged: true
    pid: host
    network_mode: host
    volumes:
      - /etc/open5gs:/etc/open5gs
      - /var/log/open5gs:/var/log/open5gs
      - /run/systemd/system:/run/systemd/system:ro
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
      - /usr/bin/systemctl:/usr/bin/systemctl:ro
      - /bin/systemctl:/bin/systemctl:ro
      - /lib/systemd:/lib/systemd:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - ./logs:/var/log/open5gs-nms
      - ./data:/app/data
      - /etc/open5gs/backups/config:/etc/open5gs/backups/config
      - /etc/open5gs/backups/mongodb:/etc/open5gs/backups/mongodb
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring:/app/monitoring
      - ./genieacs/logs:/var/log/genieacs:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx-sas:ro
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://127.0.0.1:27017/open5gs
      - BACKUP_PATH=/etc/open5gs/backups/config
      - MONGO_BACKUP_PATH=/etc/open5gs/backups/mongodb
      - LOG_LEVEL=info
      - WS_PORT=3002
      - HOST_SYSTEMCTL_PATH=/usr/bin/systemctl
      # Auth
      - AUTH_DB_PATH=/app/data/auth.db
      - SESSION_MAX_AGE=86400
      - FIRST_RUN_PASSWORD=${FIRST_RUN_PASSWORD:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      # Prometheus sync
      - PROMETHEUS_CONFIG_PATH=/app/monitoring/prometheus.yml
      - PROMETHEUS_PORT=${PROMETHEUS_PORT:-9099}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/api/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,container"
    labels:
      com.open5gs.nms.service: "backend"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
      args:
        - VITE_API_URL=
        - VITE_WS_URL=
        - VITE_PROMETHEUS_PORT=${PROMETHEUS_PORT:-9099}
        - VITE_GRAFANA_PORT=${GRAFANA_PORT:-3000}
    container_name: open5gs-nms-frontend
    restart: unless-stopped
    network_mode: host
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,container"
    labels:
      com.open5gs.nms.service: "frontend"

  monitoring-init:
    image: busybox:latest
    container_name: open5gs-monitoring-init
    restart: "no"
    network_mode: host
    user: root
    command:
      - /bin/sh
      - -c
      - |
        chown -R 65534:65534 /prometheus_data
        chown -R 472:472 /grafana_data
        echo "Monitoring data directories initialised"
    volumes:
      - ./monitoring/prometheus_data:/prometheus_data
      - ./monitoring/grafana_data:/grafana_data

  prometheus:
    image: prom/prometheus:latest
    container_name: open5gs-prometheus
    restart: unless-stopped
    network_mode: host
    depends_on:
      monitoring-init:
        condition: service_completed_successfully
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.listen-address=0.0.0.0:${PROMETHEUS_PORT:-9099}'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./monitoring:/etc/prometheus
      - ./monitoring/prometheus_data:/prometheus
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    labels:
      com.open5gs.nms.service: "prometheus"

  grafana:
    image: grafana/grafana-oss:latest
    container_name: open5gs-grafana
    restart: unless-stopped
    network_mode: host
    depends_on:
      monitoring-init:
        condition: service_completed_successfully
      prometheus:
        condition: service_started
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-open5gs}
      - GF_SERVER_HTTP_PORT=${GRAFANA_PORT:-3000}
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - ./monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - ./monitoring/grafana_data:/var/lib/grafana
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    labels:
      com.open5gs.nms.service: "grafana"

  cert-init:
    image: alpine/openssl
    container_name: open5gs-cert-init
    restart: "no"
    network_mode: host
    volumes:
      - ./nginx/certs:/certs
      - ./nginx/setup-sas-cert.sh:/generate-cert.sh:ro
    entrypoint: ["/bin/sh", "/generate-cert.sh"]
    labels:
      com.open5gs.nms.service: "cert-init"

  genieacs-init:
    image: busybox:latest
    container_name: genieacs-init
    restart: "no"
    network_mode: host
    user: root
    command:
      - /bin/sh
      - -c
      - |
        chown -R 999:999 /genieacs_logs
        chown -R 999:999 /genieacs_ext
        echo "GenieACS directories initialised"
    volumes:
      - ./genieacs/logs:/genieacs_logs
      - ./genieacs/ext:/genieacs_ext

  # ─────────────────────────────────────────────────────────
  # GenieACS — TR-069 Auto Configuration Server
  # CWMP (TR-069):  port 7547  ← CPEs/femtocells connect here
  # NBI (REST API): port 7557
  # FS (File srv):  port 7567
  # UI (Web UI):    port 7000
  # MongoDB DB:     genieacs   ← isolated from open5gs DB
  # ─────────────────────────────────────────────────────────
  genieacs:
    image: drumsergio/genieacs:latest
    container_name: genieacs
    restart: unless-stopped
    network_mode: host
    depends_on:
      genieacs-init:
        condition: service_completed_successfully
    environment:
      - GENIEACS_MONGODB_CONNECTION_URL=mongodb://127.0.0.1:27017/genieacs
      - GENIEACS_UI_JWT_SECRET=${GENIEACS_UI_JWT_SECRET:-changeme_set_in_env}
      - GENIEACS_CWMP_ACCESS_LOG_FILE=/var/log/genieacs/genieacs-cwmp-access.log
      - GENIEACS_NBI_ACCESS_LOG_FILE=/var/log/genieacs/genieacs-nbi-access.log
      - GENIEACS_FS_ACCESS_LOG_FILE=/var/log/genieacs/genieacs-fs-access.log
      - GENIEACS_UI_ACCESS_LOG_FILE=/var/log/genieacs/genieacs-ui-access.log
      - GENIEACS_DEBUG_FILE=/var/log/genieacs/genieacs-debug.yaml
      - GENIEACS_UI_PORT=${GENIEACS_UI_PORT:-7000}
      - GENIEACS_EXT_DIR=/opt/genieacs/ext
    volumes:
      - ./genieacs/ext:/opt/genieacs/ext
      - ./genieacs/logs:/var/log/genieacs
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      com.open5gs.nms.service: "genieacs"
