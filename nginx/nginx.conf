upstream backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream websocket {
    server 127.0.0.1:3002;
    keepalive 32;
}

upstream frontend {
    server 127.0.0.1:8081;
    keepalive 32;
}

# SAS access log format — captures CBSD IP, method, path, status, body size, response time
log_format sas_log '$time_iso8601 | $remote_addr | $request_method $request_uri | '
                   'HTTP $status | ${body_bytes_sent}b | ${request_time}s | '
                   '$http_user_agent';

server {
    listen 8888;
    server_name _;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Increase timeouts for long-running operations (config apply, service restarts)
    proxy_connect_timeout       60s;
    proxy_send_timeout          120s;
    proxy_read_timeout          120s;

    # ── WebSocket proxy ──
    location /ws {
        proxy_pass http://websocket;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Femtocell provisioning (SSE streaming, long timeout) ──
    # Must be BEFORE the general /api/ block — nginx uses first-match routing
    location /api/femto/ {
        proxy_pass http://backend/api/femto/;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     700s;
        proxy_send_timeout     700s;

        client_max_body_size 1m;
    }

    # ── SAS CBSD endpoints (WinnForum WINNF-TS-0016) ──
    location /sas/ {
        proxy_pass http://backend/sas/;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 1m;

        # Dedicated SAS log — every CBSD request goes here
        access_log /var/log/nginx/sas-access.log sas_log;
    }

    # ── Backend REST API ──
    location /api/ {
        proxy_pass http://backend/api/;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 10m;
    }

    # ── Frontend static app ──
    location / {
        proxy_pass http://frontend;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
